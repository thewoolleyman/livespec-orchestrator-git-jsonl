# Auto-update-branches workflow — fires on every master push and
# updates every non-draft open PR whose mergeStateStatus is BEHIND.
#
# Generated from livespec/templates/impl-plugin/.github/workflows/
# auto-update-branches.yml.jinja at copier-copy time; re-sync via
# `copier update` when livespec publishes a new release.
#
# Authority: livespec/SPECIFICATION/contracts.md
#   §"Shared content sync — copier template" — enumerated required
#   workflow file set every livespec-impl-* repo MUST carry.
#
# Three triggers (push + schedule + workflow_run) close the known
# race when two PRs merge in quick succession and a transitioning
# BLOCKED -> BEHIND PR would otherwise miss the push event.
#
# Auth model:
#   - Uses a GitHub App installation token instead of GITHUB_TOKEN.
#   - GITHUB_TOKEN-authored pushes do NOT trigger downstream workflows,
#     so update-branch's merge-commit push would leave every auto-updated
#     PR with zero CI check-runs and permanent BLOCKED+MERGEABLE state.
#     App-token pushes are treated as external and fire CI normally.
#   - Required repo secrets: APP_ID, APP_PRIVATE_KEY (same App used by
#     auto-enable-merge.yml).

name: Auto-update behind PRs

on:
  push:
    branches: [master]
  schedule:
    - cron: "*/5 * * * *"
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-branches
  cancel-in-progress: false

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Update PRs behind master
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          prs=$(gh pr list \
            --repo "$REPO" \
            --base master \
            --state open \
            --json number,isDraft,mergeStateStatus \
            --jq '.[] | select(.isDraft == false and .mergeStateStatus == "BEHIND") | .number')
          if [ -z "$prs" ]; then
            echo "No PRs behind master."
            exit 0
          fi
          for pr in $prs; do
            echo "::group::PR #$pr"
            if gh api -X PUT "repos/$REPO/pulls/$pr/update-branch"; then
              echo "  updated"
            else
              echo "  update failed (likely conflicts); skipping"
            fi
            echo "::endgroup::"
          done
