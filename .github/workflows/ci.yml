# Per-target matrix CI for livespec-impl-git-jsonl.
#
# Generated from livespec/templates/impl-plugin/.github/workflows/
# ci.yml.jinja at copier-copy time; re-sync via `copier update --vcs-ref=master` when
# livespec publishes a new release.
#
# Authority: livespec/SPECIFICATION/contracts.md
#   §"Pre-commit step ordering" (c)-(d) — zero-py subsetting:
#   master pushes + merge_group events always run the full aggregate
#   (merge-queue safety net); pull_request events skip Python-code
#   checks when the changeset contains zero .py files.
#
# Authority: livespec/SPECIFICATION/non-functional-requirements.md
#   §"Toolchain pins" — direct tool invocations (ruff, pyright,
#   pytest, python3) in `run:` lines are forbidden; every step
#   delegates to `just <target>`.
#
# Starter scaffold: the Python-code matrix carries only the tool-
# backed checks (lint, format, types, coverage). The metadata matrix
# is empty. As livespec-impl-git-jsonl populates dev-tooling/checks/
# scripts, add the corresponding `check-<slug>` targets to the
# appropriate matrix and to branch protection's required-status-
# checks list.

name: CI

# uv occasionally fails when the PyPI file CDN (files.pythonhosted.org)
# drops a wheel download mid-stream ("broken pipe"). UV_HTTP_RETRIES
# makes uv retry the fetch in-process instead of failing the job.
# Combined with the ~/.cache/uv actions/cache step (keyed on uv.lock)
# every uv-sync job uses below, an unchanged lock installs from cache
# and never contacts PyPI at all.
env:
  UV_HTTP_RETRIES: "5"

on:
  pull_request:
  push:
    branches: [master]
  merge_group:

jobs:
  setup:
    name: detect-py-changes
    runs-on: ubuntu-latest
    outputs:
      py_changed: ${{ steps.detect.outputs.py_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the base ref reachable for the PR diff below.
          fetch-depth: 0

      - name: Detect Python file changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            # Full-depth fetch (checkout already set fetch-depth: 0) — a
            # shallow `--depth=1` fetch doesn't bring in commits prior to
            # the base ref tip, so `git diff origin/${BASE_REF}...HEAD`
            # would intermittently fail with "no merge base" when the
            # local clone's history didn't reach the divergence point.
            # Keep `|| true` as a fallback: when fetch fails (auth,
            # network) we still try the diff against whatever
            # origin/${BASE_REF} ref the checkout already populated.
            git fetch origin "$BASE_REF" || true
            changeset=$(git diff --name-only "origin/${BASE_REF}...HEAD")
            if echo "$changeset" | grep -qE '\.py$'; then
              echo "py_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "py_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "py_changed=true" >> "$GITHUB_OUTPUT"
          fi

      # `setup` is the change-detection GATE only — it deliberately does
      # NO uv pre-warm. The matrix jobs `needs: setup`, so any work here
      # sits on the critical path before check-coverage (the long pole)
      # can start. Each matrix job restores ~/.cache/uv itself (keyed on
      # uv.lock, with the `uv-${{ runner.os }}-` prefix restore-key) and
      # runs its own `uv sync`, so on the common unchanged-lock run the
      # cache already exists and every job restores it in parallel with no
      # PyPI fetch. A serial pre-warm here would only help the first run
      # after a lock change — and the prefix restore-key already bounds
      # that to the delta wheels — so it is not worth taxing every run's
      # wall-clock. See livespec-dev-tooling-7us.10 (mirrors livespec #487).

  check-python:
    name: ${{ matrix.target }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-lint
          - check-format
          - check-types
          - check-coverage
    steps:
      # Per-step `if:` (not job-level) so each matrix entry still
      # reports a status check named `${{ matrix.target }}`. With
      # job-level `if:`, a skipped matrix collapses to one
      # `check-python` status, which doesn't satisfy branch
      # protection's requirement that each specific check name be
      # present.
      - name: Skip when no .py changes
        if: needs.setup.outputs.py_changed != 'true'
        run: echo "::notice::skipped ${{ matrix.target }} — no .py changes in this PR"

      - name: Checkout
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        if: needs.setup.outputs.py_changed == 'true'
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        if: needs.setup.outputs.py_changed == 'true'
        run: uv sync --all-groups

      - name: just ${{ matrix.target }}
        if: needs.setup.outputs.py_changed == 'true'
        run: just ${{ matrix.target }}

  # Metadata matrix runs unconditionally to preserve the repo-metadata
  # safety net. check-aggregate-completeness is the wiring-completeness
  # gate (epic li-univck) — verifies the justfile `check:` aggregate
  # wires every canonical slug. check-tool-backed-check-completeness
  # (dev-tooling v0.8.0, epic li-pyright-gate) asserts the four
  # tool-backed checks (lint, format, types, coverage) are LITERAL
  # members of BOTH the `just check` targets array AND a CI matrix —
  # so the metadata matrix MUST carry it here to satisfy the both-
  # surfaces invariant it enforces.
  check-metadata:
    name: ${{ matrix.target }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-aggregate-completeness
          # check-no-direct-destructive-cli greps the agent-facing trees
          # for direct destructive-default CLI invocations
          # (livespec/SPECIFICATION/non-functional-requirements.md
          # §"Destructive-default CLI wrapping") so a violation fails CI.
          - check-no-direct-destructive-cli
          - check-primary-checkout-commit-refuse-hook-installed
          # check-red-green-replay (no-arg) validates the COMMIT RANGE
          # origin/master..HEAD — every non-merge commit touching product
          # impl .py must carry EITHER the TDD-Red-*/TDD-Green-* pair
          # shape OR the TDD-Suite-Green-* green-verified shape,
          # regardless of subject prefix (livespec-dev-tooling v0.11.0
          # commit-range mode). It runs unconditionally: on zero-.py PRs
          # the range carries no product .py and trivially passes; on
          # master pushes the range is empty.
          - check-red-green-replay
          - check-tool-backed-check-completeness
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for ALL matrix entries: the
          # check-red-green-replay range validation enumerates
          # origin/master..HEAD and needs origin/master plus the merge
          # base in the clone — a fetch-depth: 1 checkout would make
          # the base unresolvable and fail the check actionably (it
          # never silently passes). Cheap for this repo; harmless for
          # the other metadata entries.
          fetch-depth: 0

      # The shared livespec-dev-tooling commit-refuse-hook check
      # enforces the canonical `.git/hooks/pre-commit` AND
      # `.git/hooks/pre-push` body on the primary checkout per
      # livespec/SPECIFICATION/non-functional-requirements.md
      # §"Primary-checkout commit-refuse hook" /
      # §"Commit-refuse hook bootstrap procedure" (v095 family-wide
      # invariant; supersedes the v091-v094 bare-flag mechanism
      # which caused stale-on-disk-read failures at primaries).
      # `actions/checkout` clones with empty hook bodies; install
      # the vendored canonical hook script at both paths so the
      # invariant is satisfied for the CI run.
      - name: Install commit-refuse hook (satisfy hook invariant)
        if: matrix.target == 'check-primary-checkout-commit-refuse-hook-installed'
        run: |
          install -m 0755 dev-tooling/livespec-commit-refuse-hook.sh .git/hooks/pre-commit
          install -m 0755 dev-tooling/livespec-commit-refuse-hook.sh .git/hooks/pre-push

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just ${{ matrix.target }}
        run: just ${{ matrix.target }}

  # CLI end-to-end harness — the top-of-pyramid, user-surface tier whose
  # sole interaction surface is the `claude` CLI binary (per
  # livespec/SPECIFICATION/contracts.md §"CLI end-to-end harness
  # contract"). The harness ships from livespec-dev-tooling (v0.8.0) and
  # is consumed via the imported test_workflow_full_round_trip entry
  # point wired in tests/e2e-cli/. This job runs the MOCK tier
  # (LIVESPEC_E2E_HARNESS=mock — the one mocked boundary is the
  # `claude -p` subprocess; real install-shape setup, real structural
  # skill discovery, the real fail-closed time-bomb coverage gate, and
  # the real per-skill orchestration loop all run). The coverage gate is
  # fail-closed: a `/livespec-impl-git-jsonl:*` skill added without a
  # `tests/e2e-cli/fixtures/<skill>/` directory raises CoverageGateError
  # and fails this job. The `real` tier (driving the actual `claude`
  # binary against the upstream livespec plugin paired in lockstep)
  # requires ANTHROPIC_API_KEY and is deliberately NOT run in CI.
  e2e-cli:
    name: e2e-cli
    needs: setup
    runs-on: ubuntu-latest
    env:
      LIVESPEC_E2E_HARNESS: mock
    steps:
      - name: Skip when no .py changes
        if: needs.setup.outputs.py_changed != 'true'
        run: echo "::notice::skipped e2e-cli — no .py changes in this PR"

      - name: Checkout
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        if: needs.setup.outputs.py_changed == 'true'
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        if: needs.setup.outputs.py_changed == 'true'
        run: uv sync --all-groups

      - name: Run the CLI e2e harness (mock tier, fail-closed coverage gate)
        if: needs.setup.outputs.py_changed == 'true'
        run: just check-e2e-cli

  export-telemetry:
    name: export-telemetry
    needs: [setup, check-python, check-metadata, e2e-cli]
    if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'merge_group') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export CI run telemetry to Honeycomb (closed-loop verified)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC: ${{ secrets.HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC }}
        run: bash .github/scripts/export-ci-telemetry.sh
