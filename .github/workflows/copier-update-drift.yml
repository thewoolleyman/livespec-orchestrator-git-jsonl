# Copier-update drift detection for livespec-impl-plaintext.
#
# Generated from livespec/templates/impl-plugin/.github/workflows/
# copier-update-drift.yml.jinja at copier-copy time; re-sync via
# `copier update` when livespec publishes a new release.
#
# Authority: livespec/SPECIFICATION/contracts.md
#   §"Shared content sync — copier template" — each impl repo's CI
#   SHOULD run `copier update --dry-run` and fail or warn on detected
#   drift.
#
# This workflow surfaces drift between livespec-impl-plaintext's
# generated content and livespec's current template. To re-sync
# after detected drift: run `copier update` locally and resolve any
# 3-way merge conflicts.

name: copier-update-drift

# Bootstrap note (2026-05-19): triggers reduced to workflow_dispatch only
# until livespec publishes a release tag this repo can pin against
# (Phase E of research/workflow-processes/multi-repo-split-execution-plan.md).
# Once a real release tag exists and .copier-answers.yml's compat.pinned is
# updated to a real value, restore the original pull_request + push +
# schedule trigger block from livespec/templates/impl-plugin/.github/
# workflows/copier-update-drift.yml.jinja.
on:
  workflow_dispatch:

jobs:
  drift:
    name: copier update --dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Install Python dev deps via uv (includes copier)
        run: uv sync --all-groups

      - name: copier update --dry-run
        run: |
          set -uo pipefail
          uv run copier update \
            --dry-run \
            --defaults \
            --skip-answered
